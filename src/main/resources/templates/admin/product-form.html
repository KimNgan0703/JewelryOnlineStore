<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Form - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #d4af37;
            --secondary-color: #2c3e50;
        }
        .page-shell {
            padding: 30px;
            background: #f8f9fa;
        }
        .form-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            padding: 20px;
            margin-bottom: 20px;
        }
        .form-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--secondary-color);
            margin-bottom: 14px;
        }
        .upload-box {
            border: 2px dashed #ced4da;
            border-radius: 8px;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6c757d;
            background: #fcfcfc;
        }
    </style>
</head>
<body>
<div class="page-shell">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="mb-0" style="color: var(--secondary-color);">Product Form</h1>
            <p class="text-muted mb-0">Create or update product details for the storefront.</p>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary">Cancel</button>
            <button class="btn btn-dark"><i class="fas fa-floppy-disk me-1"></i> Save Product</button>
        </div>
    </div>

    <form>
        <div class="row g-4">
            <div class="col-lg-8">
                <div class="form-card">
                    <div class="form-title">Basic Information</div>
                    <div class="row g-3">
                        <div class="col-md-8">
                            <label class="form-label">Product Name</label>
                            <input type="text" class="form-control" placeholder="e.g. 18K Gold Ring Aurora">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">SKU</label>
                            <input type="text" class="form-control" placeholder="SKU-001">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Category</label>
                            <select class="form-select">
                                <option>Ring</option>
                                <option>Necklace</option>
                                <option>Bracelet</option>
                                <option>Earring</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Brand</label>
                            <select class="form-select">
                                <option>Luxe Signature</option>
                                <option>Classic Gold</option>
                                <option>Modern Pearl</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" rows="5" placeholder="Describe materials, stone size, style, and care instructions..."></textarea>
                        </div>
                    </div>
                </div>

                <div class="form-card">
                    <div class="form-title">Pricing & Inventory</div>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Price</label>
                            <input type="number" class="form-control" placeholder="420">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Compare At Price</label>
                            <input type="number" class="form-control" placeholder="480">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Cost</label>
                            <input type="number" class="form-control" placeholder="260">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Stock Quantity</label>
                            <input type="number" class="form-control" placeholder="120">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Reorder Level</label>
                            <input type="number" class="form-control" placeholder="15">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Weight (gram)</label>
                            <input type="number" class="form-control" placeholder="4.5">
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="form-card">
                    <div class="form-title">Status</div>
                    <select class="form-select mb-3">
                        <option>Draft</option>
                        <option>Active</option>
                        <option>Archived</option>
                    </select>
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" id="featuredProduct">
                        <label class="form-check-label" for="featuredProduct">Feature on homepage</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="allowBackorder" checked>
                        <label class="form-check-label" for="allowBackorder">Allow backorder</label>
                    </div>
                </div>

                <div class="form-card">
                    <div class="form-title">Media</div>
                    <div class="upload-box mb-3">
                        <div class="text-center">
                            <i class="fas fa-cloud-arrow-up mb-2" style="font-size: 1.4rem;"></i>
                            <div>Drag and drop images here</div>
                        </div>
                    </div>
                    <button type="button" class="btn btn-outline-secondary w-100">Choose Files</button>
                </div>

                <div class="form-card mb-0">
                    <div class="form-title">SEO</div>
                    <div class="mb-3">
                        <label class="form-label">Meta Title</label>
                        <input type="text" class="form-control" placeholder="Luxury 18K Gold Ring">
                    </div>
                    <div>
                        <label class="form-label">Meta Description</label>
                        <textarea class="form-control" rows="3" placeholder="Elegant 18K gold ring with premium craftsmanship."></textarea>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
