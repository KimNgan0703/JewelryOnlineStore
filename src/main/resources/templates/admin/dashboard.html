<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/admin-base :: admin_layout(~{::#admin-content})}">
<head>
    <title>Dashboard - Admin Panel</title>
</head>
<body>
<div id="admin-content">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary-color: #d4af37; --secondary-color: #2c3e50; }
        .stat-card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 4px solid var(--primary-color); }
        .stat-value { font-size: 2.2rem; font-weight: bold; color: var(--primary-color); }
        .stat-label { color: #7f8c8d; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .chart-container { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .chart-title { font-weight: bold; color: var(--secondary-color); margin-bottom: 20px; }
        .table-container { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; padding-bottom: 10px; }
        .table { margin-bottom: 0; }
        .table thead { background-color: var(--secondary-color); color: white; }
        .table-hover tbody tr:hover { background-color: #f1ede1; }
        .status-badge { display: inline-block; padding: 5px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; }
        .status-pending { background-color: #fef5e7; color: #d68910; }
        .status-processing, .status-preparing { background-color: #ebf5fb; color: #2980b9; }
        .status-shipping { background-color: #e8f8f5; color: #0e6251; }
        .status-delivered { background-color: #eafaf1; color: #186a3b; }
        .status-cancelled { background-color: #fadbd8; color: #e74c3c; }
    </style>

    <div style="padding: 10px 0; background-color: #f4f6f9; min-height: 100vh;">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h3 mb-0" style="color: var(--secondary-color);">Thống kê tổng quan</h1>
                <p class="text-muted mb-0">Hiệu suất cửa hàng theo mốc thời gian.</p>
            </div>
            <form method="get" th:action="@{/admin/dashboard}" class="d-flex align-items-center">
                <label for="period" class="me-2 fw-bold text-muted">Thời gian:</label>
                <select id="period" name="period" class="form-select shadow-sm" style="border-radius: 20px; font-weight: bold; width: 140px; border: 2px solid var(--primary-color); cursor: pointer; color: var(--secondary-color);" onchange="this.form.submit()">
                    <option value="day" th:selected="${period == 'day'}">Hôm nay</option>
                    <option value="week" th:selected="${period == 'week'}">Tuần này</option>
                    <option value="month" th:selected="${period == 'month'}">Tháng này</option>
                    <option value="year" th:selected="${period == 'year'}">Năm nay</option>
                </select>
            </form>
        </div>

        <div class="row mb-4">
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-label" th:text="'Doanh thu ' + ${periodLabel.toLowerCase()}">Doanh thu</div>
                    <div class="stat-value" th:text="${#numbers.formatDecimal(totalSales, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-label" th:text="'Đơn hàng ' + ${periodLabel.toLowerCase()}">Tổng đơn hàng</div>
                    <div class="stat-value" th:text="${totalOrders}">0</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-label" th:text="'Khách hàng ' + ${periodLabel.toLowerCase()}">Tổng khách hàng</div>
                    <div class="stat-value" th:text="${totalCustomers}">0</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-label" th:text="'Chờ xử lý ' + ${periodLabel.toLowerCase()}">Đơn chờ xử lý</div>
                    <div class="stat-value" style="color: #e74c3c;" th:text="${pendingOrders}">0</div>
                </div>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-7">
                <div class="chart-container">
                    <div class="chart-title" th:text="${chartTitle}">Doanh thu</div>
                    <canvas id="salesChart"></canvas>
                </div>
            </div>
            <div class="col-md-5">
                <div class="chart-container">
                    <div class="chart-title">Tỉ lệ Trạng thái đơn hàng</div>
                    <canvas id="statusChart" style="max-height: 300px;"></canvas>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-12">
                <div class="table-container table-responsive">
                    <h5 style="padding: 20px 20px 10px; font-weight: bold; color: var(--secondary-color); margin: 0;">5 Đơn hàng mới nhất</h5>
                    <table class="table table-hover align-middle">
                        <thead>
                        <tr>
                            <th class="ps-3">Mã Đơn</th>
                            <th>Khách hàng</th>
                            <th>Tổng tiền</th>
                            <th>Trạng thái</th>
                            <th>Ngày đặt</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${recentOrders == null or recentOrders.isEmpty()}">
                            <td colspan="5" class="text-center py-4">Chưa có đơn hàng nào.</td>
                        </tr>
                        <tr th:each="order : ${recentOrders}">
                            <td class="ps-3"><strong th:text="${order.orderNumber}">ORD-001</strong></td>
                            <td th:text="${order.customer.fullName}">John Doe</td>
                            <td><strong style="color: var(--primary-color);" th:text="${#numbers.formatDecimal(order.total, 0, 'COMMA', 0, 'POINT')} + ' đ'">199.99</strong></td>
                            <td>
                                <span th:classappend="'status-' + ${order.orderStatus.name().toLowerCase()}"
                                      class="status-badge" th:text="${order.orderStatus.label}">Pending</span>
                            </td>
                            <td th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}">Jan 01, 2026</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        const salesLabels = /*[[${chartSalesLabels}]]*/ [];
        const salesData   = /*[[${chartSalesData}]]*/ [];
        const statusData  = /*[[${chartStatusData}]]*/ [];

        // Sales Chart
        const salesCtx = document.getElementById('salesChart').getContext('2d');
        new Chart(salesCtx, {
            type: 'bar',
            data: {
                labels: salesLabels,
                datasets: [{
                    label: 'Doanh thu (VNĐ)',
                    data: salesData,
                    backgroundColor: 'rgba(212, 175, 55, 0.8)',
                    borderColor: '#d4af37',
                    borderWidth: 1,
                    borderRadius: 4
                }]
            },
            options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
        });

        // Status Chart
        const statusCtx = document.getElementById('statusChart').getContext('2d');
        new Chart(statusCtx, {
            type: 'doughnut',
            data: {
                labels: ['Đã giao', 'Đang xử lý', 'Chờ xác nhận', 'Đang giao', 'Đã hủy'],
                datasets: [{
                    data: statusData,
                    backgroundColor: ['#27ae60', '#3498db', '#f39c12', '#0e6251', '#e74c3c'],
                    borderWidth: 0
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
        });
    </script>
</div>
</body>
</html>
