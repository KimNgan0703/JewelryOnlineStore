<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers Management - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="p-4 bg-light" style="min-height: 100vh;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h1 class="h3 mb-0">Customers</h1>
            <div class="text-muted small">Total: <span th:text="${totalItems}">0</span></div>
        </div>
    </div>

    <form class="row g-2 mb-3" method="get" th:action="@{/admin/customers}">
        <div class="col-md-7"><input class="form-control" type="text" name="keyword" placeholder="Search by name, email, phone..." th:value="${keyword}"></div>
        <div class="col-md-3">
            <select class="form-select" name="status">
                <option value="">All status</option>
                <option value="ACTIVE" th:selected="${activeStatus == 'ACTIVE'}">ACTIVE</option>
                <option value="LOCKED" th:selected="${activeStatus == 'LOCKED'}">LOCKED</option>
                <option value="PENDING" th:selected="${activeStatus == 'PENDING'}">PENDING</option>
            </select>
        </div>
        <div class="col-md-2"><button class="btn btn-outline-secondary w-100" type="submit">Filter</button></div>
    </form>

    <div class="table-responsive bg-white rounded shadow-sm mb-3">
        <table class="table table-hover mb-0 align-middle">
            <thead class="table-dark">
            <tr>
                <th>Customer</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Status</th>
                <th class="text-center">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${customers == null or customers.isEmpty()}"><td colspan="5" class="text-center text-muted py-4">No customers found.</td></tr>
            <tr th:each="customer : ${customers}">
                <td>
                    <div class="fw-semibold" th:text="${customer.fullName}">Customer Name</div>
                    <small class="text-muted" th:text="'CUS-' + ${customer.id}">CUS-1</small>
                </td>
                <td th:text="${customer.email}">email</td>
                <td th:text="${customer.phone}">phone</td>
                <td><span class="badge" th:classappend="${customer.status == 'ACTIVE'} ? 'text-bg-success' : (${customer.status == 'LOCKED'} ? 'text-bg-danger' : 'text-bg-secondary')" th:text="${customer.status}">ACTIVE</span></td>
                <td class="text-center"><a class="btn btn-sm btn-outline-primary" th:href="@{/admin/customers/{id}(id=${customer.id})}"><i class="fas fa-eye"></i></a></td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="card" th:if="${isDetail != null and isDetail}">
        <div class="card-body">
            <h5 class="card-title">Customer Detail</h5>
            <div><strong>Name:</strong> <span th:text="${customer.fullName}">Name</span></div>
            <div><strong>Email:</strong> <span th:text="${customer.email}">Email</span></div>
            <div><strong>Phone:</strong> <span th:text="${customer.phone}">Phone</span></div>
            <div><strong>Status:</strong> <span th:text="${customer.status}">Status</span></div>
        </div>
    </div>

    <nav th:if="${totalPages != null and totalPages > 1}" class="mt-3">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/customers(page=${currentPage - 1},keyword=${keyword},status=${activeStatus})}">Previous</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/admin/customers(page=${i},keyword=${keyword},status=${activeStatus})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/customers(page=${currentPage + 1},keyword=${keyword},status=${activeStatus})}">Next</a>
            </li>
        </ul>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
