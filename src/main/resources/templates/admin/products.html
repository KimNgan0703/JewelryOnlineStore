<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/admin-base :: admin_layout(~{::#admin-content})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products Management - Admin</title>
</head>
<body>

<div id="admin-content">

    <div class="p-4 bg-light" style="min-height: 100vh;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h1 class="h3 mb-0">Products</h1>
                <div class="text-muted small">Total: <span th:text="${totalItems}">0</span></div>
            </div>
            <a class="btn btn-dark" th:href="@{/admin/products/new}"><i class="fas fa-plus"></i> Add New Product</a>
        </div>

        <form class="row g-2 mb-3" method="get" th:action="@{/admin/products}">
            <div class="col-md-4">
                <input class="form-control" type="text" id="keyword" name="keyword" placeholder="Tìm theo tên, SKU..." th:value="${keyword}">
            </div>
            <div class="col-md-3">
                <select class="form-select" name="categoryId" onchange="document.getElementById('keyword').value=''">
                    <option value="">Tất cả danh mục</option>
                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                            th:selected="${param.categoryId != null and param.categoryId[0] == cat.id.toString()}"></option>
                </select>
            </div>
            <div class="col-md-3">
                <select class="form-select" name="isActive" onchange="document.getElementById('keyword').value=''">
                    <option value="">Tất cả trạng thái</option>
                    <option value="true" th:selected="${param.isActive != null and param.isActive[0] == 'true'}">Đang hiện (Active)</option>
                    <option value="false" th:selected="${param.isActive != null and param.isActive[0] == 'false'}">Đã ẩn (Inactive)</option>
                </select>
            </div>
            <div class="col-md-2 d-flex gap-1">
                <button type="submit" class="btn btn-dark w-100"><i class="fas fa-filter"></i> Lọc</button>
                <a th:href="@{/admin/products}" class="btn btn-outline-secondary" title="Tải lại / Bỏ lọc"><i class="fas fa-redo"></i></a>
            </div>
        </form>

        <div class="table-responsive bg-white rounded shadow-sm">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-dark">
                <tr>
                    <th>Product</th>
                    <th>SKU</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Status</th>
                    <th class="text-center">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${products == null or products.isEmpty()}"><td colspan="7" class="text-center text-muted py-4">No products found.</td></tr>
                <tr th:each="product : ${products}">
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <img th:src="${product.primaryImageUrl}" src="https://via.placeholder.com/50" alt="Product" style="width: 50px; height: 50px; object-fit: cover; border-radius: 6px;">
                            <div>
                                <div class="fw-semibold" th:text="${product.name}">Product</div>
                                <small class="text-muted" th:text="${product.slug}">slug</small>
                            </div>
                        </div>
                    </td>
                    <td th:text="${product.sku}">SKU</td>
                    <td th:text="${product.categoryName}">Category</td>
                    <td th:text="${#numbers.formatDecimal(product.basePrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                    <td><span class="badge" th:classappend="${product.inStock} ? 'text-bg-success' : 'text-bg-danger'" th:text="${product.inStock} ? 'In Stock' : 'Out of Stock'">Stock</span></td>
                    <td><span class="badge" th:classappend="${product.active} ? 'text-bg-success' : 'text-bg-secondary'" th:text="${product.active} ? 'Active' : 'Inactive'">Status</span></td>
                    <td class="text-center">
                        <a class="btn btn-sm btn-outline-primary"
                           th:href="@{/admin/products/{id}/edit(id=${product.id})}"
                           th:title="${'Edit #' + product.id}">
                            <i class="fas fa-pen"></i>
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <nav th:if="${totalPages != null and totalPages > 1}" class="mt-3">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/products(page=${currentPage - 1},keyword=${keyword},categoryId=${param.categoryId},isActive=${param.isActive})}">Previous</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/admin/products(page=${i},keyword=${keyword},categoryId=${param.categoryId},isActive=${param.isActive})}" th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/products(page=${currentPage + 1},keyword=${keyword},categoryId=${param.categoryId},isActive=${param.isActive})}">Next</a>
                </li>
            </ul>
        </nav>
    </div>

</div>

</body>
</html>
