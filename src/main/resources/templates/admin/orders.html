<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/admin-base :: admin_layout(~{::#admin-content})}">
<head>
    <title>Orders Management - Admin</title>
</head>
<body>
<div id="admin-content">
    <style>
        :root { --primary-color: #d4af37; --secondary-color: #2c3e50; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; }
        .table-container { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; }
        .table { margin-bottom: 0; }
        .table thead { background-color: var(--secondary-color); color: white; }
        .table-hover tbody tr:hover { background-color: #f1ede1; }
        .status-badge { display: inline-block; padding: 5px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; }
        .status-pending { background-color: #fef5e7; color: #d68910; }
        .status-processing { background-color: #ebf5fb; color: #2980b9; }
        .status-preparing { background-color: #e8ebf8; color: #4a23bd; }
        .status-shipping { background-color: #e8f8f5; color: #0e6251; }
        .status-delivered { background-color: #eafaf1; color: #186a3b; }
        .status-cancelled { background-color: #fadbd8; color: #922b21; }
        .btn-view { background-color: var(--primary-color); border-color: var(--primary-color); color: var(--secondary-color); }
        .btn-view:hover { background-color: #c09b2d; border-color: #c09b2d; }
    </style>

    <div style="padding: 10px 0; min-height: 100vh;">
        <div class="page-header">
            <div>
                <h1 style="color: var(--secondary-color); margin: 0;">Đơn Hàng</h1>
                <p style="color: #7f8c8d; margin: 5px 0 0 0;">Quản lý và theo dõi đơn hàng của khách</p>
            </div>
        </div>

        <form class="toolbar" method="get" th:action="@{/admin/orders}">
            <input class="form-control" type="text" id="keyword" name="keyword" th:value="${keyword}" placeholder="Tìm theo mã đơn...">
            <select class="form-select" name="status" style="max-width: 180px;" onchange="document.getElementById('keyword').value=''">
                <option value="">Tất cả trạng thái</option>
                <option value="PENDING" th:selected="${activeStatus == 'PENDING'}">Chờ xác nhận</option>
                <option value="PROCESSING" th:selected="${activeStatus == 'PROCESSING'}">Đang xử lý</option>
                <option value="PREPARING" th:selected="${activeStatus == 'PREPARING'}">Đang chuẩn bị</option>
                <option value="SHIPPING" th:selected="${activeStatus == 'SHIPPING'}">Đang giao</option>
                <option value="DELIVERED" th:selected="${activeStatus == 'DELIVERED'}">Đã giao</option>
                <option value="CANCELLED" th:selected="${activeStatus == 'CANCELLED'}">Đã hủy</option>
            </select>
            <div class="d-flex gap-1">
                <button type="submit" class="btn btn-dark"><i class="fas fa-filter"></i> Lọc</button>
                <a th:href="@{/admin/orders}" class="btn btn-outline-secondary" title="Tải lại / Bỏ lọc"><i class="fas fa-redo"></i></a>
            </div>
        </form>

        <div class="table-container table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                <tr>
                    <th>Mã Đơn</th>
                    <th>Sản phẩm (Preview)</th>
                    <th>Tổng tiền</th>
                    <th class="text-center">SL</th>
                    <th>Thanh toán</th>
                    <th>Trạng thái</th>
                    <th>Ngày đặt</th>
                    <th class="text-center">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${orders == null or orders.isEmpty()}">
                    <td colspan="8" class="text-center text-muted py-5">
                        <i class="fas fa-box-open fs-2 mb-2 text-light"></i><br>Không tìm thấy đơn hàng nào.
                    </td>
                </tr>
                <tr th:each="order : ${orders}">
                    <td><strong th:text="${order.orderNumber}">ORD-001</strong></td>

                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <img th:if="${order.firstProductImage != null}" th:src="${order.firstProductImage}" style="width: 35px; height: 35px; object-fit: cover; border-radius: 4px;">
                            <i th:unless="${order.firstProductImage != null}" class="fas fa-gem text-muted fs-4"></i>
                            <span th:text="${order.firstProductName}" class="text-truncate" style="max-width: 150px; display: inline-block;">Ring</span>
                        </div>
                    </td>

                    <td><strong style="color: var(--primary-color);" th:text="${#numbers.formatDecimal(order.total, 0, 'COMMA', 0, 'POINT')} + ' đ'">$199.99</strong></td>
                    <td class="text-center" th:text="${order.itemCount}">3</td>

                    <td>
                        <span class="badge bg-success" th:if="${order.paymentStatus == 'paid'}">Đã TT</span>
                        <span class="badge bg-warning text-dark" th:if="${order.paymentStatus == 'pending'}">Chưa TT</span>
                        <span class="badge bg-danger" th:if="${order.paymentStatus == 'failed'}">Lỗi TT</span>
                        <span class="badge bg-info" th:if="${order.paymentStatus == 'refunded'}">Hoàn tiền</span>
                    </td>

                    <td>
                        <span class="status-badge" th:classappend="'status-' + ${order.orderStatus}" th:text="${order.orderStatusLabel}">Pending</span>
                    </td>

                    <td th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}">Jan 01, 2026</td>

                    <td class="text-center">
                        <a th:href="@{/admin/orders/{id}(id=${order.orderNumber})}" class="btn btn-sm btn-dark" title="Xem chi tiết">
                            <i class="fas fa-eye"></i>
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <nav th:if="${totalPages != null and totalPages > 1}" class="mt-4">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/orders(page=${currentPage - 1},keyword=${keyword},status=${activeStatus})}">Trang trước</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/admin/orders(page=${i},keyword=${keyword},status=${activeStatus})}" th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/orders(page=${currentPage + 1},keyword=${keyword},status=${activeStatus})}">Trang sau</a>
                </li>
            </ul>
        </nav>
    </div>
</div>
</body>
</html>
