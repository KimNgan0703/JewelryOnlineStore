<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders Management - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #d4af37;
            --secondary-color: #2c3e50;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .table-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .table {
            margin-bottom: 0;
        }
        .table thead {
            background-color: var(--secondary-color);
            color: white;
        }
        .table-hover tbody tr:hover {
            background-color: #f1ede1;
        }
        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        .status-pending {
            background-color: #fef5e7;
            color: #d68910;
        }
        .status-processing {
            background-color: #ebf5fb;
            color: #2980b9;
        }
        .status-shipped {
            background-color: #e8f8f5;
            color: #0e6251;
        }
        .status-delivered {
            background-color: #eafaf1;
            color: #186a3b;
        }
        .status-cancelled {
            background-color: #fadbd8;
            color: #922b21;
        }
        .btn-view {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: var(--secondary-color);
        }
        .btn-view:hover {
            background-color: #c09b2d;
            border-color: #c09b2d;
        }
    </style>
</head>
<body>
    <div style="padding: 30px; flex: 1; overflow-y: auto; background-color: #f8f9fa;">
        <!-- Page Header -->
        <div class="page-header">
            <div>
                <h1 style="color: var(--secondary-color); margin: 0;">Orders</h1>
                <p style="color: #7f8c8d; margin: 5px 0 0 0;">Manage customer orders</p>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <input class="form-control" type="text" placeholder="Search by order #, customer name...">
            <select class="form-select" style="max-width: 150px;">
                <option>All Status</option>
                <option>Pending</option>
                <option>Processing</option>
                <option>Shipped</option>
                <option>Delivered</option>
                <option>Cancelled</option>
            </select>
            <input type="date" class="form-control" style="max-width: 150px;">
            <button class="btn btn-outline-secondary">
                <i class="fas fa-filter"></i> Filter
            </button>
        </div>

        <!-- Orders Table -->
        <div class="table-container">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Order #</th>
                        <th>Customer</th>
                        <th>Email</th>
                        <th>Amount</th>
                        <th>Items</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${orders}">
                        <td><strong th:text="${order.orderNumber}">ORD-001</strong></td>
                        <td th:text="${order.customerName}">John Doe</td>
                        <td th:text="${order.customerEmail}">john@example.com</td>
                        <td><strong style="color: var(--primary-color);">$<span th:text="${order.totalAmount}">199.99</span></strong></td>
                        <td th:text="${order.itemCount}">3</td>
                        <td>
                            <span class="status-badge" th:classappend="'status-' + ${order.status?.toLowerCase()}" th:text="${order.status}">Pending</span>
                        </td>
                        <td th:text="${#dates.format(order.createdAt, 'MMM dd, yyyy')}">Jan 01, 2026</td>
                        <td>
                            <a th:href="@{/admin/orders/{id}(id=${order.id})}" class="btn btn-sm btn-view">
                                <i class="fas fa-eye"></i> View
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <nav aria-label="Page navigation" class="mt-4">
            <ul class="pagination justify-content-center">
                <li class="page-item"><a class="page-link" href="#">Previous</a></li>
                <li class="page-item active"><a class="page-link" href="#">1</a></li>
                <li class="page-item"><a class="page-link" href="#">2</a></li>
                <li class="page-item"><a class="page-link" href="#">Next</a></li>
            </ul>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
