<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/admin-base :: admin_layout(~{::#admin-content})}">
<head>
    <title>Inventory Management - Admin</title>
</head>
<body>
<div id="admin-content">
    <style>
        :root { --primary-color: #d4af37; --secondary-color: #2c3e50; }
        .page-shell { padding: 20px 0; background-color: #f4f6f9; }
        .summary-card { background: white; border-radius: 10px; padding: 16px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08); height: 100%; }
        .summary-value { font-size: 1.7rem; font-weight: 700; color: var(--secondary-color); }
        .toolbar { display: grid; grid-template-columns: 1fr 180px 180px auto; gap: 10px; margin: 20px 0; }
        .table-wrap { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); overflow: hidden; }
        .table thead { background: var(--secondary-color); color: white; }
        .stock-badge { font-size: 0.8rem; font-weight: 600; border-radius: 12px; padding: 5px 9px; }
        .stock-ok { background-color: #e8f8f1; color: #198754; }
        .stock-low { background-color: #fff6e6; color: #b7791f; }
        .stock-out { background-color: #fdeaea; color: #dc3545; }
    </style>

    <div class="page-shell">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="mb-0" style="color: var(--secondary-color);">Inventory</h1>
                <p class="text-muted mb-0">Track stock levels and prevent out-of-stock issues.</p>
            </div>
            <button class="btn btn-dark"><i class="fas fa-boxes-stacked me-1"></i> Import Stock Update</button>
        </div>

        <div class="row g-3">
            <div class="col-md-3"><div class="summary-card"><div class="text-muted small">SKU Tracked</div><div class="summary-value" th:text="${totalItems} ?: 640">640</div></div></div>
            <div class="col-md-3"><div class="summary-card"><div class="text-muted small">Low Stock</div><div class="summary-value text-warning">28</div></div></div>
            <div class="col-md-3"><div class="summary-card"><div class="text-muted small">Out Of Stock</div><div class="summary-value text-danger">7</div></div></div>
            <div class="col-md-3"><div class="summary-card"><div class="text-muted small">Reserved Units</div><div class="summary-value">312</div></div></div>
        </div>

        <div class="toolbar">
            <input class="form-control" type="text" placeholder="Search by product name, SKU..." th:value="${keyword}">
            <select class="form-select" th:value="${activeStatus}">
                <option value="">All Status</option>
                <option value="IN_STOCK">In Stock</option>
                <option value="LOW_STOCK">Low Stock</option>
                <option value="OUT_OF_STOCK">Out Of Stock</option>
            </select>
            <select class="form-select">
                <option>All Warehouses</option>
                <option>Main Warehouse</option>
                <option>Secondary Warehouse</option>
            </select>
            <button class="btn btn-outline-secondary"><i class="fas fa-filter me-1"></i> Filter</button>
        </div>

        <div class="table-wrap">
            <table class="table table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th>SKU</th>
                    <th>Product</th>
                    <th class="text-end">In Hand</th>
                    <th class="text-end">Reserved</th>
                    <th class="text-end">Available</th>
                    <th>Stock Status</th>
                    <th>Last Updated</th>
                    <th class="text-center">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${inventoryItems}">
                    <td><span class="fw-semibold" th:text="${item.sku} ?: 'SKU-001'">SKU-001</span></td>
                    <td th:text="${item.productName} ?: '18K Gold Ring'">18K Gold Ring</td>
                    <td class="text-end" th:text="${item.stockQuantity} ?: 120">120</td>
                    <td class="text-end" th:text="${item.reservedQuantity} ?: 14">14</td>
                    <td class="text-end" th:text="${item.availableQuantity} ?: 106">106</td>
                    <td>
                        <span class="stock-badge"
                              th:classappend="${item.availableQuantity != null and item.availableQuantity == 0 ? ' stock-out' : (item.availableQuantity != null and item.availableQuantity <= 10 ? ' stock-low' : ' stock-ok')}"
                              th:text="${item.availableQuantity != null and item.availableQuantity == 0 ? 'Out of Stock' : (item.availableQuantity != null and item.availableQuantity <= 10 ? 'Low Stock' : 'In Stock')}">In Stock</span>
                    </td>
                    <td th:text="${item.updatedAt != null ? #temporals.format(item.updatedAt, 'dd/MM/yyyy HH:mm') : '19/03/2026 10:30'}">19/03/2026 10:30</td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-outline-primary" title="Adjust"><i class="fas fa-sliders"></i></button>
                        <button class="btn btn-sm btn-outline-success" title="Restock"><i class="fas fa-truck-ramp-box"></i></button>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
