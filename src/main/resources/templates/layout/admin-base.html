<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="admin_layout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'Admin Dashboard'">Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #f7dada;
            --primary-color: #6f5959;
            --dark-charcoal: #3d3434;
            --soft-gray: #f9f9f9;
            --surface-color: #ffffff;
            --surface-muted: #f3f3f3;
            --medium-gray: #766c6c;
            --border-color: #e4d9d9;
            --sidebar-width: 250px;
            --shadow-soft: 0 14px 30px -22px rgba(35, 24, 24, 0.25);
        }
        body {
            font-family: 'Manrope', sans-serif;
            display: flex;
            min-height: 100vh;
            margin: 0;
            color: var(--dark-charcoal);
            background-color: var(--soft-gray);
        }
        .sidebar {
            width: var(--sidebar-width);
            background: var(--surface-color);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            color: var(--dark-charcoal);
            padding-top: 20px;
            border-right: 1px solid var(--border-color);
        }
        .sidebar-brand {
            padding: 0 20px 30px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 30px;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--dark-charcoal);
        }
        .sidebar-brand i { color: var(--primary-color); }
        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .sidebar-menu li {
            margin-bottom: 5px;
        }
        .sidebar-menu a {
            display: block;
            padding: 12px 20px;
            color: var(--dark-charcoal);
            text-decoration: none;
            transition: all 0.25s ease;
            border-left: 3px solid transparent;
            font-weight: 600;
        }
        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background-color: var(--primary-pink);
            color: var(--dark-charcoal);
            border-left-color: var(--primary-color);
            padding-left: 25px;
        }
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .topbar {
            background: var(--surface-color);
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        .topbar-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .btn-back-dashboard {
            color: var(--medium-gray);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s ease;
        }
        .btn-back-dashboard:hover {
            color: var(--dark-charcoal);
        }
        .topbar-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--dark-charcoal);
            margin: 0;
            padding-left: 15px;
            border-left: 2px solid var(--border-color);
        }
        .topbar-user {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .topbar-user-dropdown a, .topbar-user-dropdown button {
            color: var(--dark-charcoal);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }
        .dropdown-menu {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: var(--shadow-soft);
        }
        .dropdown-item:active,
        .dropdown-item:focus,
        .dropdown-item:hover {
            background-color: var(--primary-pink);
            color: var(--dark-charcoal);
        }
        .page-content {
            padding: 25px;
            flex: 1;
            background: radial-gradient(circle at top right, #f7dada 0%, var(--soft-gray) 35%);
        }

        .form-control,
        .form-select {
            border-color: #dccfcf;
            border-radius: 10px;
        }
        .form-control:focus,
        .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(111, 89, 89, 0.15);
        }
        .btn-dark,
        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: #fff;
        }
        .btn-dark:hover,
        .btn-primary:hover {
            background-color: #5f4b4b;
            border-color: #5f4b4b;
        }
        .btn-outline-secondary {
            border-color: #ccbebe;
            color: #6b5f5f;
        }
        .btn-outline-secondary:hover {
            background-color: var(--surface-muted);
            border-color: #bdaaaa;
            color: var(--dark-charcoal);
        }
        .table-dark,
        .table-dark > th,
        .table-dark > td,
        .table thead.table-dark th {
            background-color: var(--surface-muted) !important;
            color: var(--dark-charcoal) !important;
            border-color: #eadfdf !important;
        }
        .table-hover tbody tr:hover {
            background-color: #fbf6f6;
        }
        .card,
        .table-responsive {
            border-radius: 14px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-soft);
            background: var(--surface-color);
        }
        .pagination .page-link {
            color: #6b5f5f;
            border-color: #dbcfcf;
        }
        .pagination .page-item.active .page-link {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: #fff;
        }
        .badge.bg-secondary {
            background-color: #a89797 !important;
        }
    </style>
</head>
<body>
<aside class="sidebar">
    <div class="sidebar-brand">
        <i class="fas fa-gem"></i> Admin
    </div>
    <ul class="sidebar-menu">
        <li><a href="/admin/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
        <li><a href="/admin/products"><i class="fas fa-box"></i> Products</a></li>
        <li><a href="/admin/products/categories"><i class="fas fa-list"></i> Categories</a></li>
        <li><a href="/admin/orders"><i class="fas fa-shopping-bag"></i> Orders</a></li>
        <li><a href="/admin/customers"><i class="fas fa-users"></i> Customers</a></li>
        <li><a href="/admin/inventory"><i class="fas fa-warehouse"></i> Inventory</a></li>
        <li><a href="/admin/promotions"><i class="fas fa-percentage"></i> Promotions</a></li>
        <li><a href="/admin/reviews"><i class="fas fa-star"></i> Reviews</a></li>
        <li><a href="/admin/content/banners"><i class="fas fa-file"></i> Content</a></li>

        <li><hr style="margin: 10px 0; border-color: var(--border-color);"></li>

        <li>
            <form th:action="@{/auth/logout}" method="post" class="m-0 p-0">
                <a href="#" onclick="this.closest('form').submit(); return false;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </form>
        </li>
    </ul>
</aside>

<div class="main-content">
    <div class="topbar">
        <div class="topbar-left">
            <a th:if="${pageTitle != null and pageTitle != 'Dashboard'}"
               href="/admin/dashboard"
               class="btn-back-dashboard">
                <i class="fas fa-arrow-left"></i> Dashboard
            </a>
            <h1 class="topbar-title" th:text="${pageTitle} ?: 'Dashboard'">Dashboard</h1>
        </div>

        <div class="topbar-user">
            <div class="dropdown topbar-user-dropdown">
                <a href="#" data-bs-toggle="dropdown" class="dropdown-toggle">
                    <i class="fas fa-user-circle fs-4"></i>
                    <span th:text="${#authentication.principal.username} ?: 'Admin'">Admin</span>
                </a>
                <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0 mt-2">
                    <li><a class="dropdown-item" href="/admin/profile"><i class="fas fa-user-cog me-2"></i> My Profile</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <form th:action="@{/auth/logout}" method="post" class="m-0 p-0">
                            <button type="submit" class="dropdown-item text-danger" style="border: none; background: none; width: 100%; text-align: left;">
                                <i class="fas fa-sign-out-alt me-2"></i> Logout
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <div class="page-content">
        <div th:replace="${content}"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const currentPath = window.location.pathname;
        const menuLinks = document.querySelectorAll('.sidebar-menu a');

        menuLinks.forEach(function(link) {
            link.classList.remove('active');
            const href = link.getAttribute('href');

            if (href === '#') return;

            if (currentPath === href) {
                link.classList.add('active');
            } else if (href === '/admin/products' && currentPath.startsWith('/admin/products') && !currentPath.includes('categories')) {
                link.classList.add('active');
            } else if (href !== '/admin/dashboard' && href !== '/admin/products' && currentPath.startsWith(href)) {
                link.classList.add('active');
            }
        });

        if(currentPath === '/admin/dashboard' || currentPath === '/admin' || currentPath === '/admin/') {
            const dashboardLink = document.querySelector('.sidebar-menu a[href="/admin/dashboard"]');
            if (dashboardLink) dashboardLink.classList.add('active');
        }
    });
</script>
</body>
</html>
