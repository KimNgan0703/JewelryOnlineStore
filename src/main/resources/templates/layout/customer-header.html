<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<header th:fragment="customerHeader">

    <!-- ── Tầng 1: Logo ── -->
    <div style="background: #ffffff; border-bottom: 1px solid #dee2e6; padding: 12px 0;">
        <div class="container-fluid px-4 d-flex align-items-center justify-content-between">
            <a th:href="@{/}" style="text-decoration: none; color: #2c3e50; font-size: 1.4rem; font-weight: bold; white-space: nowrap;">
                <i class="fas fa-gem" style="color: #d4af37;"></i> Jewelry Store
            </a>
        </div>
    </div>

    <!-- ── Tầng 2: Nav + Icons cùng hàng ── -->
    <nav class="navbar navbar-expand-lg navbar-light"
         style="background: #ffffff;
                border-bottom: 1px solid #dee2e6;
                box-shadow: 0 3px 10px rgba(0,0,0,0.08);
                padding: 0;">
        <div class="container-fluid px-4">
            <button class="navbar-toggler my-2" type="button"
                    data-bs-toggle="collapse" data-bs-target="#customerNavbar"
                    aria-controls="customerNavbar" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="customerNavbar">

                <!-- Nav links bên trái -->
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link px-3 py-3" th:href="@{/}"
                           style="color: #2c3e50; font-weight: 500;">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3 py-3" th:href="@{/products}"
                           style="color: #2c3e50; font-weight: 500;">Shop</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3 py-3" th:href="@{/privacy}"
                           style="color: #2c3e50; font-weight: 500;">Privacy &amp; Term</a>
                    </li>
                </ul>

                <!-- Icons bên phải -->
                <ul class="navbar-nav ms-auto align-items-center gap-1">

                    <!-- Giỏ hàng -->
                    <!-- Đã đăng nhập → /cart -->
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link px-2" th:href="@{/cart}" title="Cart"
                           style="color: #2c3e50; font-size: 1.1rem;">
                            <i class="fas fa-shopping-bag"></i>
                        </a>
                    </li>
                    <!-- Chưa đăng nhập → /auth/login -->
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="nav-link px-2" th:href="@{/auth/login}" title="Cart"
                           style="color: #2c3e50; font-size: 1.1rem;">
                            <i class="fas fa-shopping-bag"></i>
                        </a>
                    </li>

                    <!-- My Orders -->
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link px-2" th:href="@{/orders}" title="My Orders"
                           style="color: #2c3e50; font-size: 1.1rem;">
                            <i class="fas fa-box"></i>
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="nav-link px-2" th:href="@{/auth/login}" title="My Orders"
                           style="color: #2c3e50; font-size: 1.1rem;">
                            <i class="fas fa-box"></i>
                        </a>
                    </li>

                    <!-- Wishlist -->
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link px-2" th:href="@{/wishlist}" title="Wishlist"
                           style="color: #2c3e50; font-size: 1.1rem;">
                            <i class="fas fa-heart"></i>
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="isAnonymous()">
                        <a class="nav-link px-2" th:href="@{/auth/login}" title="Wishlist"
                           style="color: #2c3e50; font-size: 1.1rem;">
                            <i class="fas fa-heart"></i>
                        </a>
                    </li>

                    <!-- Icon người — đã đăng nhập: My Account + Logout -->
                    <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                        <a href="#" class="nav-link px-2 dropdown-toggle d-flex align-items-center gap-1"
                           data-bs-toggle="dropdown" aria-expanded="false"
                           style="color: #2c3e50; font-size: 1.1rem;">
                            <i class="fas fa-user"></i>
                            <span style="font-size: 0.82rem; font-weight: 500; max-width: 140px;
                                         overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"
                                  sec:authentication="name"></span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li>
                                <a class="dropdown-item" th:href="@{/account/profile}">
                                    <i class="fas fa-user-circle me-2"></i>My Account
                                </a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form th:action="@{/auth/logout}" method="post" class="m-0">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="dropdown-item" type="submit">
                                        <i class="fas fa-sign-out-alt me-2"></i>Logout
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </li>

                    <!-- Icon người — chưa đăng nhập: Login + Register -->
                    <li class="nav-item dropdown" sec:authorize="isAnonymous()">
                        <a href="#" class="nav-link px-2 dropdown-toggle"
                           data-bs-toggle="dropdown" aria-expanded="false"
                           style="color: #2c3e50; font-size: 1.1rem;">
                            <i class="fas fa-user"></i>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li>
                                <a class="dropdown-item" th:href="@{/auth/login}">
                                    <i class="fas fa-sign-in-alt me-2"></i>Login
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item" th:href="@{/auth/register}">
                                    <i class="fas fa-user-plus me-2"></i>Register
                                </a>
                            </li>
                        </ul>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

</header>
</body>
</html>
