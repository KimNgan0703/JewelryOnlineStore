<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav class="navbar navbar-expand-lg navbar-light sticky-top" style="background: #ffffff; border-bottom: 1px solid #dee2e6;" th:fragment="customerHeader">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}" style="color: black !important; font-weight: bold;">
            <i class="fas fa-gem"></i> Jewelry Store
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#customerNavbar" aria-controls="customerNavbar" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="customerNavbar">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/}" style="color: black !important;">Home</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/products}" style="color: black !important;">Shop</a></li>

                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-link" th:href="@{/auth/login}" style="color: black !important;">Login</a>
                </li>
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-link" th:href="@{/auth/register}" style="color: black !important;">Register</a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/cart}" style="color: black !important;"><i class="fas fa-shopping-cart"></i> Cart</a>
                </li>

                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle" href="#" id="customerUserDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false" style="color: black !important;">
                        <i class="fas fa-user"></i>
                        <span sec:authentication="name">Account</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="customerUserDropdown">
                        <li><a class="dropdown-item" th:href="@{/account/profile}">My Account</a></li>
                        <li><a class="dropdown-item" th:href="@{/orders}">My Orders</a></li>
                        <li><a class="dropdown-item" th:href="@{/wishlist}">Wishlist</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/auth/logout}" method="post" class="m-0">
                                <button class="dropdown-item" type="submit">Logout</button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
