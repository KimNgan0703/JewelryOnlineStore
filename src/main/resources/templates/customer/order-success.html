<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dat hang thanh cong - Jewelry Online Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card shadow-sm">
                <div class="card-body p-4 text-center">
                    <h3 class="text-success mb-3">Dat hang thanh cong</h3>
                    <p class="mb-1">Ma don hang:</p>
                    <h5 th:text="${order.orderNumber}">ORD123</h5>
                    <p class="text-muted" th:if="${order != null}">Cam on ban da mua sam tai Jewelry Store.</p>
                    <div class="mt-4 d-flex justify-content-center gap-2">
                        <a class="btn btn-outline-secondary" href="/orders">Xem danh sach don hang</a>
                        <a class="btn btn-primary" th:href="@{/orders/{orderNumber}(orderNumber=${order.orderNumber})}">Xem chi tiet</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
