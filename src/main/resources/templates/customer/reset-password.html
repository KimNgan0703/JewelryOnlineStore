<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dat lai mat khau - Jewelry Online Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h4 class="mb-3">Dat lai mat khau</h4>

                    <div class="alert alert-warning" th:if="${tokenExpired}">
                        Lien ket dat lai mat khau khong hop le hoac da het han.
                    </div>

                    <form th:if="${!tokenExpired}" th:action="@{/auth/reset-password}" th:object="${resetPasswordRequest}" method="post">
                        <input type="hidden" th:field="*{token}">

                        <div class="mb-3">
                            <label for="newPassword" class="form-label">Mat khau moi</label>
                            <input id="newPassword" type="password" class="form-control" th:field="*{newPassword}" required>
                            <small class="text-danger" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></small>
                        </div>

                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">Xac nhan mat khau</label>
                            <input id="confirmPassword" type="password" class="form-control" th:field="*{confirmPassword}" required>
                            <small class="text-danger" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></small>
                        </div>

                        <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                        <button type="submit" class="btn btn-primary w-100">Cap nhat mat khau</button>
                    </form>

                    <div class="mt-3 text-center">
                        <a href="/auth/login">Quay lai dang nhap</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
