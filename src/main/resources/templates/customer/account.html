<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account - Jewelry Online Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #d4af37;
            --secondary-color: #2c3e50;
        }
        .account-sidebar,
        .account-content {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .account-sidebar {
            padding: 0;
            overflow: hidden;
        }
        .sidebar-menu {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .sidebar-menu li {
            border-bottom: 1px solid #ecf0f1;
        }
        .sidebar-menu li:last-child {
            border-bottom: none;
        }
        .sidebar-menu a,
        .sidebar-menu button.nav-link {
            display: block;
            width: 100%;
            text-align: left;
            padding: 14px 18px;
            color: var(--secondary-color);
            text-decoration: none;
            border-left: 3px solid transparent;
            border-radius: 0;
        }
        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background-color: #f8f9fa;
            color: var(--primary-color);
            border-left-color: var(--primary-color);
        }
        .account-content {
            padding: 24px;
        }
        .content-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--secondary-color);
            margin-bottom: 20px;
        }
        .address-card {
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .address-card.default {
            border-color: var(--primary-color);
            background: #fcfbf6;
        }
    </style>
</head>
<body>
<div th:replace="~{layout/customer-header :: customerHeader}"></div>

<div class="container my-5">
    <h1 class="mb-4" style="color: var(--secondary-color);">My Account</h1>

    <div id="accountMessage" class="alert d-none" role="alert"></div>

    <div class="row g-4">
        <div class="col-md-3">
            <div class="account-sidebar">
                <ul class="sidebar-menu">
                    <li><a href="#profile" data-tab="profile" class="account-tab"><i class="fas fa-user me-2"></i>Profile</a></li>
                    <li><a href="#addresses" data-tab="addresses" class="account-tab"><i class="fas fa-map-marker-alt me-2"></i>Addresses</a></li>
                    <li><a href="#password" data-tab="password" class="account-tab"><i class="fas fa-lock me-2"></i>Change Password</a></li>
                    <li>
                        <form th:action="@{/auth/logout}" method="post" class="m-0 p-0">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="nav-link border-0 bg-transparent"><i class="fas fa-sign-out-alt me-2"></i>Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>

        <div class="col-md-9">
            <div id="profile" class="tab-content account-content">
                <div class="content-title"><i class="fas fa-user me-2"></i>My Profile</div>

                <form th:action="@{/account/profile}" method="post" th:object="${updateProfileRequest}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div class="mb-3">
                        <label class="form-label" for="fullName">Full Name</label>
                        <input id="fullName" class="form-control" th:field="*{fullName}" required>
                        <div class="text-danger small" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="email">Email</label>
                        <input id="email" class="form-control" th:value="${customer.email}" readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="phone">Phone</label>
                        <input id="phone" class="form-control" th:field="*{phone}">
                        <div class="text-danger small" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label" for="birthDate">Birth Date</label>
                            <input id="birthDate" type="date" class="form-control" th:field="*{birthDate}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="gender">Gender</label>
                            <select id="gender" class="form-select" th:field="*{gender}">
                                <option value="">Select gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-warning mt-3">Save Profile</button>
                </form>
            </div>

            <div id="addresses" class="tab-content account-content" style="display:none;">
                <div class="content-title"><i class="fas fa-map-marker-alt me-2"></i>My Addresses</div>

                <div id="addressList">
                    <div class="address-card" th:classappend="${addr.default} ? ' default' : ''" th:each="addr : ${addresses}" th:attr="data-id=${addr.id}">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <div class="fw-semibold">
                                    <span th:text="${addr.recipientName}">Recipient</span>
                                    <span class="badge bg-warning text-dark ms-2" th:if="${addr.default}">Default</span>
                                </div>
                                <div th:text="${addr.phone}">Phone</div>
                                <div class="text-muted" th:text="${addr.fullAddress}">Address</div>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="button" class="btn btn-sm btn-outline-secondary edit-address-btn"
                                        th:attr="data-id=${addr.id},data-recipient=${addr.recipientName},data-phone=${addr.phone},data-province=${addr.province},data-district=${addr.district},data-ward=${addr.ward},data-street=${addr.streetAddress},data-default=${addr.default}">
                                    Edit
                                </button>
                                <button type="button" class="btn btn-sm btn-outline-primary set-default-btn" th:if="${!addr.default}" th:attr="data-id=${addr.id}">Default</button>
                                <button type="button" class="btn btn-sm btn-outline-danger delete-address-btn" th:attr="data-id=${addr.id}">Delete</button>
                            </div>
                        </div>
                    </div>
                    <div class="text-muted" th:if="${addresses == null or addresses.isEmpty()}">You do not have any address yet.</div>
                </div>

                <hr>

                <h6 id="addressFormTitle">Add New Address</h6>
                <form id="addressForm">
                    <input type="hidden" id="addressId">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label" for="recipientName">Recipient Name</label>
                            <input id="recipientName" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="addressPhone">Phone</label>
                            <input id="addressPhone" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="province">Province</label>
                            <input id="province" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="district">District</label>
                            <input id="district" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="ward">Ward</label>
                            <input id="ward" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="streetAddress">Street Address</label>
                            <input id="streetAddress" class="form-control" required>
                        </div>
                    </div>
                    <div class="form-check mt-3">
                        <input id="isDefault" type="checkbox" class="form-check-input">
                        <label class="form-check-label" for="isDefault">Set as default</label>
                    </div>
                    <div class="d-flex gap-2 mt-3">
                        <button type="submit" class="btn btn-warning">Save Address</button>
                        <button type="button" id="cancelEditAddress" class="btn btn-outline-secondary" style="display:none;">Cancel Edit</button>
                    </div>
                </form>
            </div>

            <div id="password" class="tab-content account-content" style="display:none;">
                <div class="content-title"><i class="fas fa-lock me-2"></i>Change Password</div>

                <form th:action="@{/account/change-password}" method="post" th:object="${changePasswordRequest}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div class="mb-3">
                        <label class="form-label" for="currentPassword">Current Password</label>
                        <input id="currentPassword" type="password" class="form-control" th:field="*{currentPassword}" required>
                        <div class="text-danger small" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="newPassword">New Password</label>
                        <input id="newPassword" type="password" class="form-control" th:field="*{newPassword}" required>
                        <div class="text-danger small" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="confirmPassword">Confirm Password</label>
                        <input id="confirmPassword" type="password" class="form-control" th:field="*{confirmPassword}" required>
                        <div class="text-danger small" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                    </div>

                    <button type="submit" class="btn btn-warning">Update Password</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    const activeTab = /*[[${activeTab}]]*/ 'profile';
    const csrfToken = /*[[${_csrf.token}]]*/ '';
    const csrfHeader = /*[[${_csrf.headerName}]]*/ 'X-CSRF-TOKEN';
    const accountMessage = document.getElementById('accountMessage');

    function showMessage(text, isSuccess) {
        accountMessage.textContent = text;
        accountMessage.classList.remove('d-none', 'alert-success', 'alert-danger');
        accountMessage.classList.add(isSuccess ? 'alert-success' : 'alert-danger');
    }

    function activateTab(tabName) {
        document.querySelectorAll('.tab-content').forEach(tab => {
            tab.style.display = tab.id === tabName ? 'block' : 'none';
        });
        document.querySelectorAll('.account-tab').forEach(link => {
            link.classList.toggle('active', link.dataset.tab === tabName);
        });
    }

    document.querySelectorAll('.account-tab').forEach(link => {
        link.addEventListener('click', function(e) {
            e.preventDefault();
            activateTab(this.dataset.tab);
        });
    });

    activateTab(activeTab || 'profile');

    const addressForm = document.getElementById('addressForm');
    const addressIdInput = document.getElementById('addressId');
    const recipientNameInput = document.getElementById('recipientName');
    const addressPhoneInput = document.getElementById('addressPhone');
    const provinceInput = document.getElementById('province');
    const districtInput = document.getElementById('district');
    const wardInput = document.getElementById('ward');
    const streetAddressInput = document.getElementById('streetAddress');
    const isDefaultInput = document.getElementById('isDefault');
    const addressFormTitle = document.getElementById('addressFormTitle');
    const cancelEditAddress = document.getElementById('cancelEditAddress');

    function resetAddressForm() {
        addressForm.reset();
        addressIdInput.value = '';
        addressFormTitle.textContent = 'Add New Address';
        cancelEditAddress.style.display = 'none';
    }

    function getAddressPayload() {
        return {
            recipientName: recipientNameInput.value,
            phone: addressPhoneInput.value,
            province: provinceInput.value,
            district: districtInput.value,
            ward: wardInput.value,
            streetAddress: streetAddressInput.value,
            default: isDefaultInput.checked
        };
    }

    if (addressForm) {
        addressForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const id = addressIdInput.value;
            const method = id ? 'PUT' : 'POST';
            const url = id ? `/account/addresses/${id}` : '/account/addresses';

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        [csrfHeader]: csrfToken
                    },
                    body: JSON.stringify(getAddressPayload())
                });
                const result = await response.json();
                if (response.ok && result.success) {
                    showMessage(result.message || 'Address saved successfully.', true);
                    window.location.reload();
                } else {
                    showMessage(result.message || 'Cannot save address.', false);
                }
            } catch (error) {
                showMessage('Cannot save address right now. Please try again.', false);
            }
        });
    }

    document.querySelectorAll('.edit-address-btn').forEach(button => {
        button.addEventListener('click', function() {
            addressIdInput.value = this.dataset.id;
            recipientNameInput.value = this.dataset.recipient;
            addressPhoneInput.value = this.dataset.phone;
            provinceInput.value = this.dataset.province;
            districtInput.value = this.dataset.district;
            wardInput.value = this.dataset.ward;
            streetAddressInput.value = this.dataset.street;
            isDefaultInput.checked = this.dataset.default === 'true';
            addressFormTitle.textContent = 'Edit Address';
            cancelEditAddress.style.display = 'inline-block';
            activateTab('addresses');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        });
    });

    document.querySelectorAll('.set-default-btn').forEach(button => {
        button.addEventListener('click', async function() {
            const id = this.dataset.id;
            try {
                const response = await fetch(`/account/addresses/${id}/default`, {
                    method: 'PATCH',
                    headers: {
                        [csrfHeader]: csrfToken
                    }
                });
                const result = await response.json();
                if (response.ok && result.success) {
                    showMessage(result.message || 'Default address updated.', true);
                    window.location.reload();
                } else {
                    showMessage(result.message || 'Cannot set default address.', false);
                }
            } catch (error) {
                showMessage('Cannot set default address right now. Please try again.', false);
            }
        });
    });

    document.querySelectorAll('.delete-address-btn').forEach(button => {
        button.addEventListener('click', async function() {
            const id = this.dataset.id;
            if (!confirm('Delete this address?')) {
                return;
            }
            try {
                const response = await fetch(`/account/addresses/${id}`, {
                    method: 'DELETE',
                    headers: {
                        [csrfHeader]: csrfToken
                    }
                });
                const result = await response.json();
                if (response.ok && result.success) {
                    showMessage(result.message || 'Address deleted.', true);
                    window.location.reload();
                } else {
                    showMessage(result.message || 'Cannot delete address.', false);
                }
            } catch (error) {
                showMessage('Cannot delete address right now. Please try again.', false);
            }
        });
    });

    if (cancelEditAddress) {
        cancelEditAddress.addEventListener('click', resetAddressForm);
    }
</script>
<!-- Toast thông báo -->
<div th:if="${toast_success}"
     class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999" id="toastWrap">
    <div class="toast show align-items-center text-bg-success border-0">
        <div class="d-flex">
            <div class="toast-body" th:text="${toast_success}"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto"
                    onclick="document.getElementById('toastWrap').remove()"></button>
        </div>
    </div>
</div>

<div th:if="${toast_error}"
     class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999" id="toastWrapErr">
    <div class="toast show align-items-center text-bg-danger border-0">
        <div class="d-flex">
            <div class="toast-body" th:text="${toast_error}"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto"
                    onclick="document.getElementById('toastWrapErr').remove()"></button>
        </div>
    </div>
</div>

<script>
    setTimeout(() => {
        document.getElementById('toastWrap')?.remove();
        document.getElementById('toastWrapErr')?.remove();
    }, 3000);
</script>
</body>
</html>
