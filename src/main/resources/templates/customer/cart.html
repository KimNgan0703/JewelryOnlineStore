<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Jewelry Online Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #d4af37; --secondary-color: #2c3e50; }
        .cart-table, .cart-summary { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .cart-item { border-bottom: 1px solid #ecf0f1; padding: 20px; display: flex; align-items: center; gap: 16px; }
        .cart-item:last-child { border-bottom: none; }
        .cart-item.dimmed { opacity: 0.45; }
        .item-image img { width: 110px; height: 110px; object-fit: cover; border-radius: 8px; }
        .item-name { font-weight: bold; color: var(--secondary-color); }
        .item-price { color: var(--primary-color); font-weight: bold; }
        .summary-title { font-weight: bold; color: var(--secondary-color); font-size: 1.2rem; margin-bottom: 20px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .summary-row.total { border-top: 2px solid #ececec; padding-top: 12px; font-size: 1.2rem; font-weight: bold; }
        .empty-cart { text-align: center; padding: 60px 20px; color: #7f8c8d; }
        .item-check {
            width: 20px; height: 20px;
            accent-color: var(--primary-color);
            cursor: pointer; flex-shrink: 0;
        }
        .select-all-bar {
            background: white; border-radius: 8px 8px 0 0;
            padding: 14px 20px; border-bottom: 1px solid #ecf0f1;
            display: flex; align-items: center; gap: 10px;
            font-weight: 500; color: var(--secondary-color);
        }
        .selected-count { font-size: 0.85rem; color: #7f8c8d; margin-left: auto; }
        .checkout-disabled { pointer-events: none; opacity: 0.5; }
    </style>
</head>
<body>
<div th:replace="~{layout/customer-header :: customerHeader}"></div>

<div class="container my-5">
    <h1 class="mb-4" style="color: var(--secondary-color);">Shopping Cart</h1>

    <!-- Toast -->
    <div id="cartToast" class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999; display: none;">
        <div class="toast show align-items-center border-0" id="cartToastInner">
            <div class="d-flex">
                <div class="toast-body" id="cartToastMsg"></div>
                <button type="button" class="btn-close me-2 m-auto"
                        onclick="document.getElementById('cartToast').style.display='none'"></button>
            </div>
        </div>
    </div>

    <div class="row" th:if="${cart != null and cart.items != null and !cart.items.isEmpty()}">
        <div class="col-lg-8">
            <div class="cart-table" id="cartItemsContainer">

                <!-- Thanh chọn tất cả -->
                <div class="select-all-bar">
                    <input type="checkbox" class="item-check" id="selectAll" checked>
                    <label for="selectAll" style="cursor:pointer; margin:0;">Chọn tất cả</label>
                    <span class="selected-count" id="selectedCount"></span>
                </div>

                <!-- Từng sản phẩm -->
                <div class="cart-item"
                     th:each="item : ${cart.items}"
                     th:attr="data-cart-item-id=${item.cartItemId}"
                     th:id="'cart-item-' + ${item.cartItemId}">

                    <input type="checkbox"
                           class="item-check item-checkbox"
                           checked
                           th:attr="data-item-id=${item.cartItemId}">

                    <div class="item-image">
                        <a th:href="@{/products/{slug}(slug=${item.productSlug})}">
                            <img th:src="${item.imageUrl}" src="https://via.placeholder.com/120" th:alt="${item.productName}">
                        </a>
                    </div>
                    <div class="flex-grow-1">
                        <a class="text-decoration-none" th:href="@{/products/{slug}(slug=${item.productSlug})}">
                            <div class="item-name" th:text="${item.productName}">Product</div>
                        </a>
                        <div class="small text-muted mb-2" th:if="${item.size != null}">
                            Size: <strong th:text="${item.size}">M</strong>
                        </div>
                        <div class="item-price" th:text="${#numbers.formatInteger(item.unitPrice, 0, 'COMMA')} + ' ₫'">0</div>
                        <div class="small"
                             th:classappend="${item.inStock} ? 'text-success' : 'text-danger'"
                             th:text="${item.inStock} ? 'In stock' : 'Out of stock'">In stock</div>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <input type="number"
                               class="form-control qty-input"
                               style="width: 78px;" min="1"
                               th:attr="max=${item.maxQuantity}, data-item-id=${item.cartItemId}"
                               th:value="${item.quantity}">
                        <div class="fw-bold line-total"
                             th:text="${#numbers.formatInteger(item.lineTotal, 0, 'COMMA')} + ' ₫'">0</div>
                        <button class="btn btn-outline-danger btn-sm delete-btn"
                                type="button"
                                th:attr="data-item-id=${item.cartItemId}">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="mt-3">
                <a th:href="@{/products}" class="btn btn-outline-secondary">
                    <i class="fas fa-arrow-left"></i> Continue Shopping
                </a>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="cart-summary p-4">
                <div class="summary-title"><i class="fas fa-receipt"></i> Order Summary</div>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="summarySubtotal"
                          th:text="${#numbers.formatInteger(cart.subtotal, 0, 'COMMA')} + ' ₫'">0</span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span th:text="${#numbers.formatInteger(cart.shippingFee, 0, 'COMMA')} + ' ₫'">0</span>
                </div>
                <div class="summary-row"
                     th:if="${cart.discountAmount != null and cart.discountAmount > 0}">
                    <span>Discount</span>
                    <span>-<span th:text="${#numbers.formatInteger(cart.discountAmount, 0, 'COMMA')} + ' ₫'">0</span></span>
                </div>
                <div class="summary-row total">
                    <span>Total</span>
                    <span id="summaryTotal"
                          th:text="${#numbers.formatInteger(cart.total, 0, 'COMMA')} + ' ₫'">0</span>
                </div>
                <div class="text-muted small text-center mb-1" id="selectedInfo"></div>
                <a class="btn btn-warning w-100 mt-2" id="checkoutBtn" th:href="@{/orders/checkout}">
                    <i class="fas fa-credit-card"></i> Proceed to Checkout
                </a>
            </div>
        </div>
    </div>

    <div class="empty-cart"
         th:if="${cart == null or cart.items == null or cart.items.isEmpty()}">
        <i class="fas fa-shopping-cart fa-3x mb-3"></i>
        <h3>Your cart is empty</h3>
        <p>Start shopping to add items to your cart.</p>
        <a th:href="@{/products}" class="btn btn-warning mt-2">
            <i class="fas fa-shopping-bag"></i> Continue Shopping
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    const csrfToken  = /*[[${_csrf.token}]]*/ '';
    const csrfHeader = /*[[${_csrf.headerName}]]*/ 'X-CSRF-TOKEN';

    function showToast(message, success = true) {
        const toast = document.getElementById('cartToast');
        const inner = document.getElementById('cartToastInner');
        const msgEl = document.getElementById('cartToastMsg');
        msgEl.textContent = message;
        inner.className = 'toast show align-items-center border-0 '
            + (success ? 'text-bg-success' : 'text-bg-danger');
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    function formatCurrency(amount) {
        return new Intl.NumberFormat('vi-VN').format(Math.round(amount)) + ' ₫';
    }

    // ── Tính lại summary theo checkbox đang chọn ──────────
    function recalcSummary() {
        const checkboxes  = document.querySelectorAll('.item-checkbox');
        const checked     = [...checkboxes].filter(c => c.checked);
        const selectAllCb = document.getElementById('selectAll');
        const countEl     = document.getElementById('selectedCount');
        const infoEl      = document.getElementById('selectedInfo');
        const checkoutBtn = document.getElementById('checkoutBtn');
        const subtotalEl  = document.getElementById('summarySubtotal');
        const totalEl     = document.getElementById('summaryTotal');

        // Tính tổng từ lineTotal text của các item được chọn
        let total = 0;
        checked.forEach(cb => {
            const row = document.getElementById('cart-item-' + cb.dataset.itemId);
            if (!row) return;
            const lineTotalEl = row.querySelector('.line-total');
            if (lineTotalEl) {
                const num = parseFloat(lineTotalEl.textContent.replace(/[^\d]/g, ''));
                if (!isNaN(num)) total += num;
            }
        });

        if (subtotalEl) subtotalEl.textContent = formatCurrency(total);
        if (totalEl)    totalEl.textContent    = formatCurrency(total);

        const n = checked.length;
        const t = checkboxes.length;
        if (countEl) countEl.textContent = `Đã chọn ${n}/${t} sản phẩm`;
        if (infoEl)  infoEl.textContent  = n > 0 ? `${n} sản phẩm được chọn` : '';

        if (selectAllCb) {
            selectAllCb.checked       = n === t && t > 0;
            selectAllCb.indeterminate = n > 0 && n < t;
        }

        // Disable checkout nếu không có item nào được chọn
        if (checkoutBtn) {
            if (n === 0) {
                checkoutBtn.classList.add('checkout-disabled');
            } else {
                checkoutBtn.classList.remove('checkout-disabled');
            }
        }

        // Làm mờ item không chọn
        document.querySelectorAll('.cart-item[id^="cart-item-"]').forEach(row => {
            const cb = row.querySelector('.item-checkbox');
            if (cb) row.classList.toggle('dimmed', !cb.checked);
        });
    }

    // ── Chọn tất cả ───────────────────────────────────────
    const selectAllCb = document.getElementById('selectAll');
    if (selectAllCb) {
        selectAllCb.addEventListener('change', function () {
            document.querySelectorAll('.item-checkbox')
                .forEach(cb => cb.checked = this.checked);
            recalcSummary();
        });
    }

    // ── Checkbox từng item ────────────────────────────────
    document.querySelectorAll('.item-checkbox').forEach(cb => {
        cb.addEventListener('change', recalcSummary);
    });

    recalcSummary(); // chạy lần đầu

    // ── Xóa sản phẩm ─────────────────────────────────────
    document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async function () {
            const itemId = this.dataset.itemId;
            if (!confirm('Bạn có muốn xóa sản phẩm này không?')) return;
            await deleteItem(itemId);
        });
    });

    async function deleteItem(itemId) {
        try {
            const res  = await fetch(`/cart/items/${itemId}`, {
                method: 'DELETE',
                headers: { [csrfHeader]: csrfToken }
            });
            const data = await res.json();
            if (res.ok && data.success) {
                const row = document.getElementById('cart-item-' + itemId);
                if (row) row.remove();
                showToast(data.message || 'Đã xóa sản phẩm');
                recalcSummary();
                if (!data.data.items || data.data.items.length === 0) {
                    window.location.reload();
                }
            } else {
                showToast(data.message || 'Không thể xóa sản phẩm', false);
            }
        } catch (e) {
            showToast('Có lỗi xảy ra, vui lòng thử lại', false);
        }
    }

    // ── Cập nhật số lượng ─────────────────────────────────
    document.querySelectorAll('.qty-input').forEach(input => {
        let debounceTimer;
        let prevValue = parseInt(input.value) || 1;

        input.addEventListener('mousedown', function () {
            prevValue = parseInt(this.value) || 1;
        });

        input.addEventListener('input', function () {
            const itemId = this.dataset.itemId;
            const qty    = parseInt(this.value);
            const max    = parseInt(this.max) || 99;
            clearTimeout(debounceTimer);

            if (qty <= 0 || isNaN(qty)) {
                this.value = prevValue;
                if (confirm('Bạn có muốn xóa sản phẩm này không?')) {
                    deleteItem(itemId);
                }
                return;
            }
            if (qty > max) {
                this.value = max;
                showToast(`Chỉ còn ${max} sản phẩm trong kho`, false);
                return;
            }
            prevValue = qty;
            debounceTimer = setTimeout(() => updateQuantity(itemId, qty), 500);
        });
    });

    async function updateQuantity(itemId, quantity) {
        try {
            const res  = await fetch(`/cart/items/${itemId}?quantity=${quantity}`, {
                method: 'PUT',
                headers: { [csrfHeader]: csrfToken }
            });
            const data = await res.json();
            if (res.ok && data.success) {
                const row = document.getElementById('cart-item-' + itemId);
                if (row && data.data.items) {
                    const itemData = data.data.items.find(i => i.cartItemId == itemId);
                    if (itemData) {
                        const lineTotalEl = row.querySelector('.line-total');
                        if (lineTotalEl) lineTotalEl.textContent = formatCurrency(itemData.lineTotal);
                    }
                }
                recalcSummary();
            } else {
                showToast(data.message || 'Không thể cập nhật số lượng', false);
            }
        } catch (e) {
            showToast('Có lỗi xảy ra, vui lòng thử lại', false);
        }
    }
</script>
</body>
</html>
