<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Jewelry Online Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #d4af37; --secondary-color: #2c3e50; }
        .cart-table, .cart-summary { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .cart-item { border-bottom: 1px solid #ecf0f1; padding: 20px; display: flex; align-items: center; gap: 20px; }
        .cart-item:last-child { border-bottom: none; }
        .item-image img { width: 110px; height: 110px; object-fit: cover; border-radius: 8px; }
        .item-name { font-weight: bold; color: var(--secondary-color); }
        .item-price { color: var(--primary-color); font-weight: bold; }
        .summary-title { font-weight: bold; color: var(--secondary-color); font-size: 1.2rem; margin-bottom: 20px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .summary-row.total { border-top: 2px solid #ececec; padding-top: 12px; font-size: 1.2rem; font-weight: bold; }
        .empty-cart { text-align: center; padding: 60px 20px; color: #7f8c8d; }
    </style>
</head>
<body>
<div th:replace="~{layout/customer-header :: customerHeader}"></div>

<div class="container my-5">
    <h1 class="mb-4" style="color: var(--secondary-color);">Shopping Cart</h1>

    <div class="row" th:if="${cart != null and cart.items != null and !cart.items.isEmpty()}">
        <div class="col-lg-8">
            <div class="cart-table">
                <div class="cart-item" th:each="item : ${cart.items}">
                    <div class="item-image">
                        <a th:href="@{/products/{slug}(slug=${item.productSlug})}">
                            <img th:src="${item.imageUrl}" src="https://via.placeholder.com/120" th:alt="${item.productName}">
                        </a>
                    </div>
                    <div class="flex-grow-1">
                        <a class="text-decoration-none" th:href="@{/products/{slug}(slug=${item.productSlug})}"><div class="item-name" th:text="${item.productName}">Product</div></a>
                        <div class="small text-muted mb-2" th:if="${item.size != null}">Size: <strong th:text="${item.size}">M</strong></div>
                        <div class="item-price" th:text="${item.unitPrice}">0</div>
                        <div class="small" th:classappend="${item.inStock} ? 'text-success' : 'text-danger'" th:text="${item.inStock} ? 'In stock' : 'Out of stock'">In stock</div>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <input type="number" class="form-control" style="width: 78px;" min="1" th:attr="max=${item.maxQuantity},data-item-id=${item.cartItemId}" th:value="${item.quantity}">
                        <div class="fw-bold" th:text="${item.lineTotal}">0</div>
                        <button class="btn btn-outline-danger btn-sm" type="button" th:attr="data-item-id=${item.cartItemId}"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            </div>

            <div class="mt-3">
                <a th:href="@{/products}" class="btn btn-outline-secondary"><i class="fas fa-arrow-left"></i> Continue Shopping</a>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="cart-summary p-4">
                <div class="summary-title"><i class="fas fa-receipt"></i> Order Summary</div>

                <div class="summary-row"><span>Subtotal</span><span th:text="${cart.subtotal}">0</span></div>
                <div class="summary-row"><span>Shipping</span><span th:text="${cart.shippingFee}">0</span></div>
                <div class="summary-row" th:if="${cart.discountAmount != null and cart.discountAmount > 0}"><span>Discount</span><span>-<span th:text="${cart.discountAmount}">0</span></span></div>

                <div class="mb-3" th:if="${cart.appliedCouponCode != null}">
                    <div class="small text-muted">Coupon: <strong th:text="${cart.appliedCouponCode}">CODE</strong></div>
                    <div class="small" th:text="${cart.couponMessage}">Message</div>
                </div>

                <div class="summary-row total"><span>Total</span><span th:text="${cart.total}">0</span></div>

                <a class="btn btn-warning w-100 mt-2" th:href="@{/orders/checkout}"><i class="fas fa-credit-card"></i> Proceed to Checkout</a>
            </div>
        </div>
    </div>

    <div class="empty-cart" th:if="${cart == null or cart.items == null or cart.items.isEmpty()}">
        <i class="fas fa-shopping-cart fa-3x mb-3"></i>
        <h3>Your cart is empty</h3>
        <p>Start shopping to add items to your cart.</p>
        <a th:href="@{/products}" class="btn btn-warning mt-2"><i class="fas fa-shopping-bag"></i> Continue Shopping</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
