<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quen mat khau - Jewelry Online Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/customer-theme.css}">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h4 class="mb-3">Quen mat khau</h4>
                    <p class="text-muted">Nhap email de nhan lien ket dat lai mat khau.</p>

                    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}">
                    </div>

                    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}">
                    </div>

                    <form th:action="@{/auth/forgot-password}" th:object="${forgotPasswordRequest}" method="post">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input id="email" type="email" class="form-control" th:field="*{email}" required>
                            <small class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Gui yeu cau</button>
                    </form>

                    <div class="mt-3 text-center">
                        <a href="/auth/login">Quay lai dang nhap</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
