<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${collection.name} + ' - Jewelry Store'">Bộ Sưu Tập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ── Giống home.html ── */
        :root {
            --primary-color: #d4af37;
            --secondary-color: #2c3e50;
        }
        .product-card {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .product-card:hover { box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
        .product-image {
            width: 100%; height: 250px;
            background-color: #f0f0f0;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .product-image img { width: 100%; height: 100%; object-fit: cover; }
        .product-badge {
            position: absolute; top: 10px; right: 10px;
            background-color: var(--primary-color);
            color: var(--secondary-color);
            padding: 5px 10px; border-radius: 20px;
            font-size: 0.75rem; font-weight: bold;
        }
        .product-info { padding: 15px; background-color: white; }
        .product-name { font-weight: bold; color: var(--secondary-color); margin-bottom: 10px; }
        .product-price { color: var(--primary-color); font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; }
        .product-rating { color: #f39c12; font-size: 0.9rem; margin-bottom: 10px; }
        .btn-add-cart {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: var(--secondary-color); font-weight: bold;
        }
        .btn-add-cart:hover { background-color: #c09b2d; border-color: #c09b2d; }
        .section-title {
            font-size: 2rem; font-weight: bold;
            color: var(--secondary-color); margin-bottom: 10px; text-align: center;
        }

        /* ── Banner carousel ── */
        .banner-section .carousel-inner img {
            min-height: 300px; max-height: 70vh;
            width: 100%; object-fit: cover; object-position: center;
        }
        .carousel-caption {
            background: rgba(0,0,0,0.4);
            border-radius: 10px; padding: 15px;
        }
        .carousel-caption h3 { margin: 0; font-weight: bold; text-shadow: 1px 1px 4px rgba(0,0,0,0.8); }
        .carousel-control-prev-icon, .carousel-control-next-icon {
            background-color: rgba(0,0,0,0.3); border-radius: 50%; padding: 25px;
        }

        /* ── Sidebar lọc ── */
        .sidebar {
            background: white; padding: 20px;
            border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 16px;
        }
        .sidebar-title { font-weight: bold; color: var(--secondary-color); margin-bottom: 10px; font-size: 0.95rem; }

        /* ── Toolbar ── */
        .products-toolbar {
            background: white; padding: 12px 18px;
            border-radius: 8px; margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex; justify-content: space-between;
            align-items: center; flex-wrap: wrap; gap: 10px;
        }
    </style>
</head>
<body>
<div th:replace="~{layout/customer-header :: customerHeader}"></div>

<!-- ── Banner bộ sưu tập ── -->
<section class="banner-section">
    <div th:if="${banners != null and !banners.isEmpty()}"
         id="collectionBannerCarousel" class="carousel slide carousel-fade" data-bs-ride="carousel">

        <div class="carousel-indicators" th:if="${#lists.size(banners) > 1}">
            <button th:each="b,s : ${banners}" type="button"
                    data-bs-target="#collectionBannerCarousel"
                    th:data-bs-slide-to="${s.index}"
                    th:classappend="${s.index==0}?'active':''"></button>
        </div>

        <div class="carousel-inner">
            <div th:each="b,s : ${banners}" class="carousel-item" data-bs-interval="4000"
                 th:classappend="${s.index==0}?'active':''">
                <a th:href="${b.linkUrl != null and !b.linkUrl.isEmpty() ? b.linkUrl : '#'}">
                    <img th:src="${b.imageUrl}" class="d-block w-100" th:alt="${b.title}">
                </a>
                <div class="carousel-caption d-none d-md-block">
                    <h3 th:text="${b.title}">Tên Banner</h3>
                </div>
            </div>
        </div>

        <button th:if="${#lists.size(banners) > 1}" class="carousel-control-prev"
                type="button" data-bs-target="#collectionBannerCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button th:if="${#lists.size(banners) > 1}" class="carousel-control-next"
                type="button" data-bs-target="#collectionBannerCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>

    <!-- Fallback hero khi không có banner -->
    <div th:unless="${banners != null and !banners.isEmpty()}"
         style="background: linear-gradient(135deg, var(--secondary-color) 0%, #34495e 100%);
                color: white; padding: 70px 0; text-align: center;">
        <div class="container">
            <h1 style="font-size: 2.5rem; font-weight: bold; margin-bottom: 12px;"
                th:text="${collection.name}">Bộ Sưu Tập</h1>
            <p style="font-size: 1.1rem; opacity: .75; margin: 0;"
               th:if="${collection.description != null and !#strings.isEmpty(collection.description)}"
               th:text="${collection.description}">Mô tả bộ sưu tập</p>
        </div>
    </div>
</section>

<!-- ── Tiêu đề BST (khi có banner) ── -->
<div class="container text-center mt-5 mb-2"
     th:if="${banners != null and !banners.isEmpty()}">
    <h2 class="section-title" th:text="${collection.name}">Bộ Sưu Tập</h2>
    <p class="text-muted mb-4"
       th:if="${collection.description != null and !#strings.isEmpty(collection.description)}"
       th:text="${collection.description}">Mô tả</p>
</div>

<!-- ── Nội dung chính ── -->
<div class="container mb-5">
    <div class="row g-4">

        <!-- ── Sidebar lọc ── -->
        <div class="col-lg-3">
            <form th:action="@{/collections/{slug}(slug=${collection.slug})}" method="get">

                <div class="sidebar">
                    <div class="sidebar-title">Danh mục</div>
                    <select name="categoryId" class="form-select" onchange="this.form.submit()">
                        <option value="">Tất cả danh mục</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}" th:text="${cat.name}"
                                th:selected="${cat.id == filter.categoryId}"></option>
                    </select>
                </div>

                <div class="sidebar">
                    <div class="sidebar-title">Thương hiệu</div>
                    <select name="brandId" class="form-select" onchange="this.form.submit()">
                        <option value="">Tất cả thương hiệu</option>
                        <option th:each="br : ${brands}"
                                th:value="${br.id}" th:text="${br.name}"
                                th:selected="${br.id == filter.brandId}"></option>
                    </select>
                </div>

                <div class="sidebar">
                    <div class="sidebar-title">Chất liệu</div>
                    <select name="materialId" class="form-select" onchange="this.form.submit()">
                        <option value="">Tất cả chất liệu</option>
                        <option th:each="mat : ${materials}"
                                th:value="${mat.id}" th:text="${mat.name}"
                                th:selected="${mat.id == filter.materialId}"></option>
                    </select>
                </div>

                <div class="sidebar">
                    <div class="sidebar-title">Khoảng giá (₫)</div>
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <input type="number" name="minPrice" class="form-control"
                                   placeholder="Từ" th:value="${filter.minPrice}">
                        </div>
                        <div class="col-6">
                            <input type="number" name="maxPrice" class="form-control"
                                   placeholder="Đến" th:value="${filter.maxPrice}">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 fw-bold">
                        <i class="fas fa-filter me-1"></i> Lọc
                    </button>
                    <a th:href="@{/collections/{slug}(slug=${collection.slug})}"
                       class="btn btn-outline-secondary w-100 mt-2">Xóa bộ lọc</a>
                </div>

            </form>
        </div>

        <!-- ── Danh sách sản phẩm ── -->
        <div class="col-lg-9">

            <!-- Toolbar -->
            <div class="products-toolbar">
                <span class="text-muted" style="font-size: 0.9rem;">
                    Hiển thị <strong th:text="${totalItems}">0</strong> sản phẩm
                </span>
                <form method="get" th:action="@{/collections/{slug}(slug=${collection.slug})}">
                    <input type="hidden" name="categoryId" th:value="${filter.categoryId}">
                    <input type="hidden" name="brandId"    th:value="${filter.brandId}">
                    <input type="hidden" name="materialId" th:value="${filter.materialId}">
                    <input type="hidden" name="minPrice"   th:value="${filter.minPrice}">
                    <input type="hidden" name="maxPrice"   th:value="${filter.maxPrice}">
                    <div class="d-flex align-items-center gap-2">
                        <span class="text-muted" style="font-size:0.9rem; white-space:nowrap;">Sắp xếp:</span>
                        <select class="form-select form-select-sm" style="width:auto;"
                                name="sortBy" onchange="this.form.submit()">
                            <option value="newest"     th:selected="${filter.sortBy == 'newest'}">Mới nhất</option>
                            <option value="price_asc"  th:selected="${filter.sortBy == 'price_asc'}">Giá tăng dần</option>
                            <option value="price_desc" th:selected="${filter.sortBy == 'price_desc'}">Giá giảm dần</option>
                            <option value="rating"     th:selected="${filter.sortBy == 'rating'}">Đánh giá cao</option>
                        </select>
                    </div>
                </form>
            </div>

            <!-- Grid — giống home.html -->
            <div class="row" th:if="${products != null and !products.isEmpty()}">
                <div class="col-6 col-md-4 mb-4" th:each="product : ${products}">
                    <div class="card product-card h-100">
                        <div class="product-badge" th:if="${product.discountPercent != null}"
                             th:text="'-' + ${product.discountPercent} + '%'">-20%</div>

                        <a th:href="@{/products/{slug}(slug=${product.slug})}" class="text-decoration-none">
                            <div class="product-image">
                                <img th:if="${product.primaryImageUrl != null}"
                                     th:src="${product.primaryImageUrl}"
                                     th:alt="${product.name}"
                                     src="https://via.placeholder.com/250">
                                <img th:unless="${product.primaryImageUrl != null}"
                                     src="https://via.placeholder.com/250" alt="Product">
                            </div>
                            <div class="product-info">
                                <div class="product-name" th:text="${product.name}">Tên sản phẩm</div>
                                <div class="product-rating">
                                    <i class="fas fa-star text-warning"></i>
                                    <span th:text="${product.averageRating ?: '0.0'}">0.0</span>
                                    <span class="text-muted" style="font-size:0.78rem;">
                                        (<span th:text="${product.reviewCount ?: '0'}">0</span>)
                                    </span>
                                </div>
                                <div class="product-price"
                                     th:text="${#numbers.formatInteger(product.basePrice,0,'COMMA')} + ' ₫'">0 ₫</div>
                            </div>
                        </a>
                        <div class="px-3 pb-3 mt-auto">
                            <a class="btn btn-sm btn-add-cart w-100"
                               th:href="@{/products/{slug}(slug=${product.slug})}">
                                <i class="fas fa-eye me-1"></i> Xem sản phẩm
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Empty state -->
            <div class="text-center py-5 text-muted"
                 th:unless="${products != null and !products.isEmpty()}">
                <i class="fas fa-box-open fa-3x mb-3 d-block"></i>
                <h5>Không tìm thấy sản phẩm phù hợp</h5>
                <p>Hãy thử điều chỉnh bộ lọc của bạn.</p>
            </div>

            <!-- Phân trang -->
            <nav class="mt-3" th:if="${totalPages > 1}">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/collections/{slug}(slug=${collection.slug},page=${currentPage-1},categoryId=${filter.categoryId},brandId=${filter.brandId},materialId=${filter.materialId},minPrice=${filter.minPrice},maxPrice=${filter.maxPrice},sortBy=${filter.sortBy})}">
                            Trước
                        </a>
                    </li>
                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, totalPages-1)}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link"
                           th:href="@{/collections/{slug}(slug=${collection.slug},page=${i},categoryId=${filter.categoryId},brandId=${filter.brandId},materialId=${filter.materialId},minPrice=${filter.minPrice},maxPrice=${filter.maxPrice},sortBy=${filter.sortBy})}"
                           th:text="${i+1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/collections/{slug}(slug=${collection.slug},page=${currentPage+1},categoryId=${filter.categoryId},brandId=${filter.brandId},materialId=${filter.materialId},minPrice=${filter.minPrice},maxPrice=${filter.maxPrice},sortBy=${filter.sortBy})}">
                            Sau
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
