<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Jewelry Online Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #d4af37;
            --secondary-color: #2c3e50;
        }
        body {
            background: linear-gradient(135deg, var(--secondary-color) 0%, #34495e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            max-width: 400px;
            width: 100%;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h1 {
            color: var(--primary-color);
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .login-header p {
            color: #7f8c8d;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-label {
            color: var(--secondary-color);
            font-weight: bold;
            margin-bottom: 8px;
        }
        .form-control {
            border: 1px solid #bdc3c7;
            border-radius: 5px;
            padding: 10px 15px;
        }
        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(212, 175, 55, 0.25);
        }
        .btn-login {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: var(--secondary-color);
            font-weight: bold;
            padding: 10px 20px;
            width: 100%;
            margin-top: 10px;
        }
        .btn-login:hover {
            background-color: #c09b2d;
            border-color: #c09b2d;
        }
        .form-check {
            margin-bottom: 15px;
        }
        .form-check-input {
            border-color: #bdc3c7;
        }
        .form-check-input:checked {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }
        .links {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .links a {
            color: var(--primary-color);
            text-decoration: none;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .signup-section {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #ecf0f1;
        }
        .signup-section p {
            color: #7f8c8d;
            margin-bottom: 0;
        }
        .signup-section a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
        }
        .signup-section a:hover {
            text-decoration: underline;
        }
        .alert {
            border-left: 4px solid var(--primary-color);
            background-color: #f1ede1;
            color: var(--secondary-color);
            margin-bottom: 20px;
        }
        .oauth-section {
            margin-top: 20px;
        }
        .oauth-divider {
            text-align: center;
            margin: 20px 0;
            color: #bdc3c7;
            position: relative;
        }
        .oauth-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background-color: #bdc3c7;
            z-index: 0;
        }
        .oauth-divider span {
            background: white;
            padding: 0 10px;
            position: relative;
            z-index: 1;
        }
        .oauth-buttons {
            display: flex;
            gap: 10px;
        }
        .btn-oauth {
            flex: 1;
            background-color: #f0f0f0;
            border: 1px solid #bdc3c7;
            color: var(--secondary-color);
            padding: 8px 10px;
            border-radius: 5px;
            text-decoration: none;
            text-align: center;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn-oauth:hover {
            background-color: #ecf0f1;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Login Header -->
        <div class="login-header">
            <h1><i class="fas fa-gem"></i></h1>
            <h1>Jewelry Store</h1>
            <p>Login to your account</p>
        </div>

        <!-- Alert Messages -->
        <div th:if="${param.error}" class="alert alert-danger" role="alert">
            Invalid email or password. Please try again.
        </div>
        <div th:if="${param.logout}" class="alert alert-success" role="alert">
            You have been successfully logged out.
        </div>

        <!-- Login Form -->
        <form method="post" th:action="@{/auth/login}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="redirect" th:value="${redirect}">
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember" name="remember-me">
                <label class="form-check-label" for="remember">
                    Remember me
                </label>
            </div>

            <div class="links">
                <a href="/auth/forgot-password">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-login">Sign In</button>
        </form>

        <!-- OAuth Options -->
        <div class="oauth-section">
            <div class="oauth-divider">
                <span>Or continue with</span>
            </div>
            <div class="oauth-buttons">
                <a href="/oauth2/authorization/google" class="btn-oauth">
                    <i class="fab fa-google"></i> Google
                </a>
            </div>
        </div>

        <!-- Sign Up Section -->
        <div class="signup-section">
            <p>Don't have an account? <a href="/auth/register">Sign up here</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
