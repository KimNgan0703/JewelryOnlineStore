<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Jewelry Online Store</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6f5959",
                        "on-primary": "#ffffff",
                        "on-primary-fixed": "#271718",
                        "on-primary-fixed-variant": "#564242",
                        "primary-container": "#f7dada",
                        "primary-fixed": "#f9dcdc",
                        "on-background": "#1a1c1c",
                        "on-surface": "#1a1c1c",
                        "on-surface-variant": "#4f4444",
                        "surface": "#f9f9f9",
                        "surface-container": "#eeeeee",
                        "surface-container-low": "#f3f3f3",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#d2c3c3",
                    },
                    fontFamily: {
                        headline: ["Manrope"],
                        body: ["Manrope"],
                    },
                },
            },
        };
    </script>
    <style>
        body {
            font-family: 'Manrope', sans-serif;
        }

        .ghost-border {
            border-bottom: 1px solid rgba(210, 195, 195, 0.2);
            transition: all 0.3s ease;
        }

        .ghost-border:focus-within {
            border-bottom: 1px solid #6f5959;
        }

        .glass-panel {
            background: rgba(247, 218, 218, 0.8);
            backdrop-filter: blur(16px);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased overflow-hidden">
<main class="flex min-h-screen">
    <!-- Visual Section (Jewelry Imagery) -->
    <section class="hidden lg:flex lg:w-1/2 relative bg-surface-container-low overflow-hidden">
        <div class="absolute inset-0 z-0">
            <img class="w-full h-full object-cover opacity-90 scale-105"
                 alt="Trang sức tối giản sang trọng"
                 src="https://lh3.googleusercontent.com/aida-public/AB6AXuA2Mj68_tfH0UP2wSd-kNwGkIhPOS56TojKamI8isA57jnD2KtSsctd5tetR_y3LPnDypfQQKciR_rT_NKXTCjgopiJIXCd6e0ODjpTV327iXW25c-DccmFwBy30-vl-Y0LtNvQvZ-krEvpJ7-OVShmKoynxQAOUx3o11nuGB9HX9wN5vWfau5QVwY-8E3AP0nrISkfJ2OxTF7d1JgKTEuNh_YBm5aFpzcZ4TGd6HTePDC28ETkMfszWGjrCGPoR9804MizSN3G50d8">
        </div>
        <!-- Branding Overlay -->
        <div class="relative z-10 p-16 flex flex-col justify-between h-full w-full">
            <div>
                <h1 class="font-headline font-bold text-4xl tracking-tighter text-on-background" style="color: #6f5959;">Jewelry Store</h1>
            </div>
            <div class="max-w-md">
                <p class="font-headline text-5xl font-bold tracking-tight text-on-background mb-6 leading-tight">
                    Trang sức của sự thanh lịch.
                </p>
                <div class="w-24 h-1 bg-on-background opacity-20"></div>
            </div>
        </div>
        <!-- Decorative Element -->
        <div class="absolute -bottom-24 -right-24 w-96 h-96 rounded-full bg-primary-container opacity-30 blur-3xl"></div>
    </section>

    <!-- Form Section -->
    <section class="w-full lg:w-1/2 flex items-center justify-center p-8 md:p-16 lg:p-24 bg-surface">
        <div class="w-full max-w-md space-y-8">
            <!-- Header -->
            <div class="space-y-4">
                <div class="lg:hidden mb-8">
                    <span class="font-headline font-bold text-2xl tracking-tighter text-on-background" style="color: #6f5959;">Jewelry Store</span>
                </div>
                <h2 class="font-headline text-3xl font-bold text-on-background tracking-tight">Chào mừng trở lại</h2>
                <p class="text-on-surface-variant font-body leading-relaxed text-sm">Vui lòng nhập thông tin để truy cập tài khoản của bạn.</p>
            </div>

            <!-- Alert Messages -->
            <div th:if="${param.error}" class="p-4 rounded-md bg-red-100 border border-red-300">
                <p class="text-red-800 text-sm font-body">Email hoặc mật khẩu không hợp lệ. Vui lòng thử lại.</p>
            </div>
            <div th:if="${param.logout}" class="p-4 rounded-md bg-green-100 border border-green-300">
                <p class="text-green-800 text-sm font-body">Bạn đã đăng xuất thành công.</p>
            </div>

            <!-- Form -->
            <form class="space-y-8" method="post" th:action="@{/auth/login}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="redirect" th:value="${redirect}">

                <div class="space-y-6">
                    <!-- Email Field -->
                    <div class="ghost-border group transition-all duration-300">
                        <label class="block font-headline text-xs uppercase tracking-wider text-on-surface-variant mb-2" for="email">
                            Địa chỉ email
                        </label>
                        <input class="block w-full bg-transparent border-none p-0 pb-3 text-on-background focus:ring-0 placeholder:text-outline-variant font-body text-base"
                               id="email"
                               name="email"
                               placeholder="email@example.com"
                               required
                               type="email">
                    </div>

                    <!-- Password Field -->
                    <div class="ghost-border group transition-all duration-300">
                        <div class="flex justify-between items-center mb-2">
                            <label class="block font-headline text-xs uppercase tracking-wider text-on-surface-variant" for="password">
                                Mật khẩu
                            </label>
                            <a class="font-headline text-xs uppercase tracking-widest text-primary hover:text-on-primary-fixed-variant transition-colors font-semibold"
                               href="/auth/forgot-password">
                                Quên mật khẩu?
                            </a>
                        </div>
                        <input class="block w-full bg-transparent border-none p-0 pb-3 text-on-background focus:ring-0 placeholder:text-outline-variant font-body text-base"
                               id="password"
                               name="password"
                               placeholder="••••••••"
                               required
                               type="password">
                    </div>
                </div>

                <!-- Remember Me -->
                <div class="flex items-center space-x-3">
                    <input class="w-4 h-4 rounded-sm border-outline-variant text-on-primary-fixed focus:ring-primary-container transition-all cursor-pointer"
                           id="remember"
                           name="remember-me"
                           type="checkbox">
                    <label class="text-sm font-body text-on-surface-variant cursor-pointer" for="remember">
                        Ghi nhớ tôi trong 30 ngày
                    </label>
                </div>

                <!-- Buttons -->
                <div class="space-y-4 pt-4">
                    <button class="w-full bg-on-primary-fixed text-primary-fixed font-headline font-bold py-4 rounded-md tracking-tight hover:bg-stone-800 transition-all duration-300 active:scale-95"
                            type="submit"
                            style="background-color: #271718;">
                        Đăng nhập
                    </button>
                    <button class="w-full flex items-center justify-center space-x-3 bg-surface-container-lowest border border-outline-variant/20 text-on-background font-headline font-semibold py-4 rounded-md tracking-tight hover:bg-surface-container-low transition-all duration-300 active:scale-95"
                            type="button"
                            onclick="location.href='/oauth2/authorization/google'">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"></path>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"></path>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"></path>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"></path>
                        </svg>
                        <span>Tiếp tục với Google</span>
                    </button>
                </div>
            </form>

            <!-- Sign Up Section -->
            <div class="pt-8 text-center">
                <p class="font-body text-sm text-on-surface-variant">
                    Chưa có tài khoản?
                    <a class="font-headline font-bold text-on-background hover:text-primary transition-colors ml-1" href="/auth/register">
                        Đăng ký tại đây
                    </a>
                </p>
            </div>
        </div>
    </section>
</main>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
