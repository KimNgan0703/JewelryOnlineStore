<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt Lại Mật Khẩu - Jewelry Online Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h4 class="mb-3">Đặt Lại Mật Khẩu</h4>

                    <div class="alert alert-danger" th:if="${tokenExpired == true}">
                        Đường dẫn đặt lại mật khẩu không hợp lệ hoặc đã hết hạn.
                        Vui lòng <a href="/auth/forgot-password">nhấn vào đây</a> để yêu cầu gửi lại.
                    </div>

                    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                    <form th:unless="${tokenExpired == true}" th:action="@{/auth/reset-password}" th:object="${resetPasswordRequest}" method="post">

                        <input type="hidden" th:field="*{token}">

                        <div class="mb-3">
                            <label class="form-label">Mật khẩu mới</label>
                            <input type="password" class="form-control" th:field="*{newPassword}" required minlength="6">
                            <small class="text-danger" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Xác nhận mật khẩu</label>
                            <input type="password" class="form-control" th:field="*{confirmPassword}" required minlength="6">
                            <small class="text-danger" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></small>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Xác nhận đổi mật khẩu</button>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
